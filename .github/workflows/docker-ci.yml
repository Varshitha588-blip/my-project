name: ML CI Pipeline
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version:'3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

        name: Run Tests
        run: pytest

      - name: Build Docker Image
        uses: docker build -t ml-devops-demo